# ============================================================
# Stage 2: Phone Fine-Tune
# ============================================================
# Fine-tunes the Stage 1 pretrained weights on phone-captured
# night-road images.  Uses a lower learning rate to preserve
# learned features, shorter warmup, and fewer total epochs.
# ============================================================

# --- optimizer ---
lr0: 0.001           # initial learning rate (lower than stage 1)
lrf: 0.01            # final LR = lr0 * lrf
momentum: 0.937      # SGD momentum / beta1
weight_decay: 0.0005 # L2 regularization

# --- warmup ---
warmup_epochs: 2.0   # warmup duration (epochs)

# --- training schedule ---
epochs: 50           # total training epochs
patience: 20         # early-stopping patience (epochs without improvement)

# --- augmentation ---
close_mosaic: 10     # disable mosaic augmentation N epochs before end
cos_lr: True         # use cosine annealing LR schedule

# --- image ---
imgsz: 640           # training image size (square)

# --- performance ---
amp: True            # automatic mixed precision (FP16)
